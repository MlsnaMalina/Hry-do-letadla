<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0A0E17"/>
  <!-- Controller body fill (subtle) -->
  <rect x="8" y="30" width="84" height="40" rx="13" fill="url(#g)" opacity="0.14"/>
  <!-- Controller body outline -->
  <rect x="8" y="30" width="84" height="40" rx="13" fill="none" stroke="url(#g)" stroke-width="6"/>
  <!-- Left grip -->
  <path d="M19 68 Q11 76 16 84" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round"/>
  <!-- Right grip -->
  <path d="M81 68 Q89 76 84 84" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round"/>
  <!-- D-pad horizontal -->
  <rect x="18" y="46" width="22" height="8" rx="4" fill="url(#g)"/>
  <!-- D-pad vertical -->
  <rect x="25" y="39" width="8" height="22" rx="4" fill="url(#g)"/>
  <!-- 4 buttons in diamond arrangement -->
  <circle cx="64" cy="40" r="5.5" fill="url(#g)"/>
  <circle cx="73" cy="50" r="5.5" fill="url(#g)"/>
  <circle cx="64" cy="60" r="5.5" fill="url(#g)"/>
  <circle cx="55" cy="50" r="5.5" fill="url(#g)"/>
</svg>
